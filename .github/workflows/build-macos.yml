name: Build macOS DMG

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - prod

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download upstream Go binaries from release
        run: |
          mkdir -p dist/bin
          curl -sL "https://github.com/wavetermdev/waveterm/releases/download/v0.14.5/Wave-darwin-arm64-0.14.5.zip" -o /tmp/wave-upstream.zip
          unzip -j /tmp/wave-upstream.zip "Wave.app/Contents/Resources/app.asar.unpacked/dist/bin/*" -d dist/bin/
          chmod +x dist/bin/*
          echo "--- Binaries downloaded ---"
          ls -la dist/bin/

      - name: Build frontend
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "prod" ]; then
            npm run build:prod
          else
            npm run build:dev
          fi

      - name: Build DMG
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaveTerm-i18n-macOS-DMG-arm64
          path: dist-electron/*.dmg
          retention-days: 7

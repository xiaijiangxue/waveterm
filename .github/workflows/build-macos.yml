name: Build macOS DMG

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - prod

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "prod" ]; then
            npm run build:prod
          else
            npm run build:dev
          fi

      - name: Build DMG
        run: npx electron-builder --mac dmg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaveTerm-macOS-DMG
          path: dist/*.dmg
          retention-days: 7
